version: '3.8'

services:
  # MySQL 8.0 数据库
  mysql:
    image: mysql:8.0.36
    container_name: metersphere-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Password123@mysql
      MYSQL_DATABASE: metersphere_test
      MYSQL_USER: metersphere
      MYSQL_PASSWORD: Password123@mysql
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - /opt/metersphere/conf/mysql/init:/docker-entrypoint-initdb.d
      - /opt/metersphere/conf/mysql/my.cnf:/etc/mysql/my.cnf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pPassword123@mysql"]
      timeout: 20s
      retries: 10

  # Redis 7.2 缓存
  redis:
    image: redis:7.2.6-alpine
    container_name: metersphere-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass "Password123@redis"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      timeout: 3s
      retries: 5

  # Kafka 3.9 消息队列 (KRaft 模式，无需 Zookeeper)
  kafka:
    image: kafka:3.9.0
    container_name: metersphere-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
      KAFKA_LOG_DIRS: /opt/kafka/logs
    volumes:
      - kafka_data:/opt/kafka/logs
    restart: unless-stopped

  # MinIO 对象存储
  minio:
    image: minio:0.0.0
    container_name: metersphere-minio
    ports:
      - "9000:9000"  # API 端口
      - "9001:9001"  # Console 端口
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_CONSOLE_ADDRESS: ":9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      timeout: 20s
      retries: 3

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: metersphere-dev
    driver: bridge