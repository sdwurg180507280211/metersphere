<svg width="1440" height="1040" viewBox="0 0 1440 1040" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">家庭幸福决定因素因果图：含孩子版本</title>
  <desc id="desc">以分栏结构展示钱、社会地位、夫妻双方成熟度、夫妻关系、共同养育、亲子关系、孩子状态、压力与家庭幸福之间的关系。</desc>

  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f8f70" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b85d2c" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3d6f9f" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8067a8" />
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d18f2f" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#332a1c" flood-opacity="0.13" />
    </filter>

    <style>
      .bg { fill: #f6f2ea; }
      .grid { stroke: rgba(32, 33, 31, 0.055); stroke-width: 1; }
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #20211f; }
      .subtitle { font: 400 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #68655e; }
      .panel { fill: rgba(255, 250, 241, 0.72); stroke: #ded4c3; stroke-width: 2; }
      .panelTitle { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #20211f; }
      .panelNote { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #68655e; }
      .node { fill: #fffaf1; stroke: #ded4c3; stroke-width: 2; filter: url(#shadow); }
      .nodeTitle { font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #20211f; }
      .nodeText { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #68655e; }
      .formula { font: 700 28px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #fff8ed; }
      .formulaSub { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #eadfcd; }
      .edge { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.78; }
      .edgeThin { fill: none; stroke-width: 3.2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.72; }
      .positive { stroke: #2f8f70; marker-end: url(#arrowGreen); }
      .negative { stroke: #b85d2c; marker-end: url(#arrowRed); }
      .relationEdge { stroke: #3d6f9f; marker-end: url(#arrowBlue); }
      .statusEdge { stroke: #8067a8; marker-end: url(#arrowPurple); }
      .childEdge { stroke: #d18f2f; marker-end: url(#arrowOrange); }
      .dash { stroke-dasharray: 10 10; }
      .edgeLabel { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4c4943; paint-order: stroke; stroke: #fffaf1; stroke-width: 5; stroke-linejoin: round; }
      .badgeText { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: white; }
      .legend { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #68655e; }
      .conclusion { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #20211f; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="1040" />
  <g opacity="1">
    <path class="grid" d="M 80 0 V 1040 M 160 0 V 1040 M 240 0 V 1040 M 320 0 V 1040 M 400 0 V 1040 M 480 0 V 1040 M 560 0 V 1040 M 640 0 V 1040 M 720 0 V 1040 M 800 0 V 1040 M 880 0 V 1040 M 960 0 V 1040 M 1040 0 V 1040 M 1120 0 V 1040 M 1200 0 V 1040 M 1280 0 V 1040 M 1360 0 V 1040" />
    <path class="grid" d="M 0 80 H 1440 M 0 160 H 1440 M 0 240 H 1440 M 0 320 H 1440 M 0 400 H 1440 M 0 480 H 1440 M 0 560 H 1440 M 0 640 H 1440 M 0 720 H 1440 M 0 800 H 1440 M 0 880 H 1440 M 0 960 H 1440" />
  </g>

  <text class="title" x="70" y="82">家庭幸福决定因素：含孩子的家庭系统图</text>
  <text class="subtitle" x="70" y="118">钱是安全底座；夫妻双方成熟度、夫妻关系、共同养育、亲子关系和孩子状态，构成家庭幸福主体。</text>

  <rect x="70" y="150" width="1300" height="98" rx="18" fill="#211f1b" filter="url(#shadow)" />
  <text class="formula" x="720" y="192" text-anchor="middle">H = g(M) × Q家庭系统 - P</text>
  <text class="formulaSub" x="720" y="222" text-anchor="middle">Q家庭系统 = 夫妻双方成熟度 + 夫妻关系 + 共同养育 + 亲子关系 + 孩子状态</text>

  <rect class="panel" x="70" y="290" width="280" height="530" rx="22" />
  <rect class="panel" x="395" y="290" width="650" height="530" rx="22" />
  <rect class="panel" x="1090" y="290" width="280" height="530" rx="22" />

  <g id="arrows-under-nodes">
    <path class="edge statusEdge dash" d="M 210 590 L 210 520" />
    <path class="edge positive" d="M 315 448 L 365 448 L 365 372 L 1090 372 L 1090 476 L 1120 476" />
    <path class="edge negative dash" d="M 315 486 L 365 486 L 365 830 L 1230 830 L 1230 755" />

    <path class="edgeThin relationEdge" d="M 680 448 L 760 448" />
    <path class="edgeThin relationEdge" d="M 555 506 L 555 570" />
    <path class="edgeThin relationEdge" d="M 885 506 L 885 540 L 640 540 L 640 570" />
    <path class="edgeThin relationEdge" d="M 680 628 L 760 628" />
    <path class="edgeThin relationEdge" d="M 885 686 L 885 704 L 720 704 L 720 705" />

    <path class="edgeThin childEdge dash" d="M 595 752 L 380 752 L 380 628 L 430 628" />
    <path class="edge relationEdge" d="M 1010 628 L 1060 628 L 1060 500 L 1120 500" />
    <path class="edge negative" d="M 1230 635 L 1230 542" />
    <path class="edge childEdge dash" d="M 845 752 L 1065 752 L 1065 693 L 1120 693" />
  </g>

  <text class="panelTitle" x="100" y="330">一、底座与外部资源</text>
  <text class="panelNote" x="100" y="354">解决现实压力，但不直接制造爱</text>
  <text class="panelTitle" x="425" y="330">二、家庭人际系统 Q</text>
  <text class="panelNote" x="425" y="354">有孩子后，家庭从二人关系变成三角反馈系统</text>
  <text class="panelTitle" x="1120" y="330">三、结果与消耗</text>
  <text class="panelNote" x="1120" y="354">幸福由系统质量增加，被压力扣减</text>

  <g id="nodes">
    <g transform="translate(105 390)">
      <rect class="node" width="210" height="116" rx="14" />
      <rect x="0" y="0" width="9" height="116" rx="5" fill="#2f8f70" />
      <text class="nodeTitle" x="26" y="39">钱 M</text>
      <text class="nodeText" x="26" y="70">住房、医疗、教育</text>
      <text class="nodeText" x="26" y="94">孩子会抬高够用线</text>
      <circle cx="172" cy="34" r="20" fill="#2f8f70" />
      <text class="badgeText" x="172" y="39" text-anchor="middle">底座</text>
    </g>

    <g transform="translate(105 590)">
      <rect class="node" width="210" height="116" rx="14" />
      <rect x="0" y="0" width="9" height="116" rx="5" fill="#8067a8" />
      <text class="nodeTitle" x="26" y="39">社会地位 S</text>
      <text class="nodeText" x="26" y="70">资源、教育机会</text>
      <text class="nodeText" x="26" y="94">通过资源间接影响</text>
      <circle cx="172" cy="34" r="20" fill="#8067a8" />
      <text class="badgeText" x="172" y="39" text-anchor="middle">间接</text>
    </g>

    <g transform="translate(430 390)">
      <rect class="node" width="250" height="116" rx="14" />
      <rect x="0" y="0" width="9" height="116" rx="5" fill="#9d4f46" />
      <text class="nodeTitle" x="26" y="39">夫妻双方成熟度 C/E</text>
      <text class="nodeText" x="26" y="70">责任、克制、共情</text>
      <text class="nodeText" x="26" y="94">家庭温度与上限</text>
      <circle cx="210" cy="34" r="20" fill="#9d4f46" />
      <text class="badgeText" x="210" y="39" text-anchor="middle">核心</text>
    </g>

    <g transform="translate(760 390)">
      <rect class="node" width="250" height="116" rx="14" />
      <rect x="0" y="0" width="9" height="116" rx="5" fill="#3d6f9f" />
      <text class="nodeTitle" x="26" y="39">夫妻关系 R₁</text>
      <text class="nodeText" x="26" y="70">尊重、信任、冲突修复</text>
      <text class="nodeText" x="26" y="94">决定家庭情绪气候</text>
      <circle cx="210" cy="34" r="20" fill="#3d6f9f" />
      <text class="badgeText" x="210" y="39" text-anchor="middle">气候</text>
    </g>

    <g transform="translate(430 570)">
      <rect class="node" width="250" height="116" rx="14" />
      <rect x="0" y="0" width="9" height="116" rx="5" fill="#3d6f9f" />
      <text class="nodeTitle" x="26" y="39">共同养育 A</text>
      <text class="nodeText" x="26" y="70">分担、原则一致、补位</text>
      <text class="nodeText" x="26" y="94">决定有娃后的稳定性</text>
      <circle cx="210" cy="34" r="20" fill="#3d6f9f" />
      <text class="badgeText" x="210" y="39" text-anchor="middle">协作</text>
    </g>

    <g transform="translate(760 570)">
      <rect class="node" width="250" height="116" rx="14" />
      <rect x="0" y="0" width="9" height="116" rx="5" fill="#3d6f9f" />
      <text class="nodeTitle" x="26" y="39">亲子关系 R₂</text>
      <text class="nodeText" x="26" y="70">陪伴、看见、边界</text>
      <text class="nodeText" x="26" y="94">孩子安全感来源</text>
      <circle cx="210" cy="34" r="20" fill="#3d6f9f" />
      <text class="badgeText" x="210" y="39" text-anchor="middle">依恋</text>
    </g>

    <g transform="translate(595 705)">
      <rect class="node" width="250" height="94" rx="14" />
      <rect x="0" y="0" width="9" height="94" rx="5" fill="#d18f2f" />
      <text class="nodeTitle" x="26" y="38">孩子状态 D</text>
      <text class="nodeText" x="26" y="70">成本、意义、反馈变量</text>
      <circle cx="210" cy="34" r="20" fill="#d18f2f" />
      <text class="badgeText" x="210" y="39" text-anchor="middle">结构</text>
    </g>

    <g transform="translate(1120 410)">
      <rect class="node" width="220" height="132" rx="16" fill="#fff7e7" />
      <rect x="0" y="0" width="10" height="132" rx="5" fill="#2f8f70" />
      <text class="nodeTitle" x="28" y="43">家庭幸福 H</text>
      <text class="nodeText" x="28" y="76">稳定、安全、亲密</text>
      <text class="nodeText" x="28" y="101">被支持、有意义</text>
    </g>

    <g transform="translate(1120 635)">
      <rect class="node" width="220" height="116" rx="14" />
      <rect x="0" y="0" width="9" height="116" rx="5" fill="#b85d2c" />
      <text class="nodeTitle" x="26" y="39">长期压力 P</text>
      <text class="nodeText" x="26" y="70">债务、疾病、缺席</text>
      <text class="nodeText" x="26" y="94">高压、关系消耗</text>
    </g>
  </g>

  <g id="arrow-labels">
    <text class="edgeLabel" x="585" y="386">物质安全达标 → 幸福下限提高</text>
    <text class="edgeLabel" x="385" y="850">钱不足 → 风险暴露 → 压力上升</text>
    <text class="edgeLabel" x="1038" y="616">Q 提高幸福主体质量</text>
    <text class="edgeLabel" x="1248" y="594">压力扣减</text>
    <text class="edgeLabel" x="885" y="776">孩子问题会增加压力</text>
    <text class="edgeLabel" x="398" y="735">孩子状态反馈养育压力</text>
  </g>

  <g transform="translate(70 880)">
    <rect x="0" y="0" width="1300" height="116" rx="16" fill="#fffaf1" stroke="#ded4c3" />
    <text class="conclusion" x="30" y="36">阅读顺序：先看左侧底座，再看中间家庭人际系统，最后看右侧幸福结果与压力扣减。</text>

    <circle cx="34" cy="70" r="7" fill="#2f8f70" />
    <text class="legend" x="50" y="75">物质安全支撑</text>
    <circle cx="190" cy="70" r="7" fill="#3d6f9f" />
    <text class="legend" x="206" y="75">关系/协作支撑</text>
    <circle cx="360" cy="70" r="7" fill="#d18f2f" />
    <text class="legend" x="376" y="75">孩子结构与反馈</text>
    <circle cx="540" cy="70" r="7" fill="#b85d2c" />
    <text class="legend" x="556" y="75">长期压力扣减</text>
    <circle cx="710" cy="70" r="7" fill="#8067a8" />
    <text class="legend" x="726" y="75">社会地位间接影响</text>

    <text class="legend" x="30" y="101">结论：钱决定现实安全下限；有孩子后，家庭幸福主要取决于夫妻双方成熟度、夫妻关系、共同养育、亲子关系和孩子状态。</text>
  </g>
</svg>
