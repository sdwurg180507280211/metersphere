spring.application.name=analytics
server.port=8009
management.server.port=7009
management.endpoints.web.exposure.include=health,info
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.endpoint.health.show-details=always
management.health.ldap.enabled=false

# flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=analytics_version
spring.flyway.baseline-version=0
spring.flyway.encoding=UTF-8
spring.flyway.validate-on-migrate=false

# spring
spring.main.allow-bean-definition-overriding=true

# logging
logging.file.path=/opt/metersphere/logs/analytics

# ========== 知识库检索配置 ==========
# 已外移至 /opt/metersphere/conf/metersphere.properties
# 通过 @PropertySource 加载，包含以下配置项：
# - elasticsearch.*（ES 连接）
# - embedding.api.*（向量 Embedding API）
# - chat.api.*（知识问答大模型 API，支持 top-p / prompt-rules / history-turns）
# - file.parsing.*（文件解析参数）
# - knowledge.kafka.*（知识库 Kafka Topic）

# Kafka（bootstrap-servers 从 metersphere.properties 读取，此处提供默认值）
spring.kafka.bootstrap-servers=${kafka.bootstrap-servers:localhost:9092}
spring.kafka.consumer.group-id=knowledge-processing-group
knowledge.kafka.topic=knowledge-file-processing

# 文件上传大小限制
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
