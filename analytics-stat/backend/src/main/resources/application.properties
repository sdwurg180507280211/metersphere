spring.application.name=analytics
server.port=8009
management.server.port=7009

# flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=analytics_version
spring.flyway.baseline-version=0
spring.flyway.encoding=UTF-8
spring.flyway.validate-on-migrate=false

# spring
spring.main.allow-bean-definition-overriding=true

# logging
logging.file.path=/opt/metersphere/logs/analytics

# ========== 知识库检索配置 ==========
# 已外移至 /opt/metersphere/conf/metersphere.properties
# 通过 @PropertySource 加载，包含以下配置项：
# - elasticsearch.*（ES 连接）
# - embedding.api.*（向量 Embedding API）
# - file.parsing.*（文件解析参数）
# - knowledge.kafka.*（知识库 Kafka Topic）
