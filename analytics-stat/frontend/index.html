<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI工作台 - MeterSphere</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- 
      开发模式：Vite 会自动注入 type="module" 的 script 标签
      生产构建：vite.config.ts 配置了 IIFE 格式输出，
      Vite 会生成 <script defer> 而非 <script type="module">，
      确保 micro-app 的 appendChild 注入方式能正常执行
    -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
