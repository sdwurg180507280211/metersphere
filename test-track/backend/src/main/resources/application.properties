spring.application.name=track
server.port=8005
management.server.port=7005
management.endpoints.web.exposure.include=health,info
management.endpoint.health.enabled=true
management.endpoint.info.enabled=true
management.endpoint.health.show-details=always
management.health.ldap.enabled=false
#
quartz.enabled=true
quartz.scheduler-name=trackScheduler
#
logging.file.path=/opt/metersphere/logs/test-track
rocketmq.client.logRoot=/opt/metersphere/logs/test-track/rocketmq
# flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=track_version
spring.flyway.baseline-version=0
spring.flyway.encoding=UTF-8
spring.flyway.validate-on-migrate=false
#
spring.main.allow-bean-definition-overriding=true
#