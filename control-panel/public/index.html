<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeterSphere 控制面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f7; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { margin-bottom: 30px; color: #1d1d1f; }
    .section { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { font-size: 20px; margin-bottom: 16px; color: #1d1d1f; }
    .btn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    button { padding: 12px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; background: #007aff; color: white; }
    button:hover { background: #0051d5; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.running { background: #34c759; }
    button.running:hover { background: #28a745; }
    button.stopped { background: #8e8e93; }
    button.stopped:hover { background: #636366; }
    button:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
    .log { margin-top: 16px; padding: 12px; background: #f8f8f8; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 MeterSphere 控制面板</h1>

    <div class="section">
      <h2>服务管理</h2>
      <div class="btn-grid" id="services-grid"></div>
      <div id="service-log" class="log" style="display:none;"></div>
    </div>

    <div class="section">
      <h2>前端构建</h2>
      <div class="btn-grid">
        <button onclick="buildModule('system-setting')">System Setting</button>
        <button onclick="buildModule('project-management')">Project Management</button>
        <button onclick="buildModule('test-track')">Test Track</button>
        <button onclick="buildModule('api-test')">API Test</button>
        <button onclick="buildModule('performance-test')">Performance Test</button>
        <button onclick="buildModule('report-stat')">Report Stat</button>
        <button onclick="buildModule('workstation')">Workstation</button>
        <button onclick="buildModule('analytics-stat')">Analytics Stat</button>
        <button onclick="buildModule('sdk-parent')">SDK Parent (Gateway)</button>
      </div>
      <div id="build-log" class="log" style="display:none;"></div>
    </div>
  </div>

  <script>
    const services = [
      { id: 'eureka', name: 'Eureka' },
      { id: 'gateway', name: 'Gateway' },
      { id: 'system-setting', name: 'System Setting' },
      { id: 'project-management', name: 'Project Management' },
      { id: 'test-track', name: 'Test Track' },
      { id: 'api-test', name: 'API Test' },
      { id: 'performance-test', name: 'Performance Test' },
      { id: 'report-stat', name: 'Report Stat' },
      { id: 'workstation', name: 'Workstation' },
      { id: 'workflow-service', name: 'Workflow Service' },
      { id: 'analytics-stat', name: 'Analytics Stat' }
    ];

    let serviceStatus = {};

    // 初始化服务按钮
    function initServices() {
      const grid = document.getElementById('services-grid');
      services.forEach(svc => {
        const btn = document.createElement('button');
        btn.id = `service-${svc.id}`;
        btn.className = 'stopped';
        btn.textContent = svc.name;
        btn.onclick = () => toggleService(svc.id);
        grid.appendChild(btn);
      });
      updateServiceStatus();
      setInterval(updateServiceStatus, 3000);
    }

    // 更新服务状态
    async function updateServiceStatus() {
      const res = await fetch('/api/services/status');
      serviceStatus = await res.json();

      services.forEach(svc => {
        const btn = document.getElementById(`service-${svc.id}`);
        const isRunning = serviceStatus[svc.id];
        btn.className = isRunning ? 'running' : 'stopped';
        btn.textContent = `${svc.name} ${isRunning ? '●' : '○'}`;
      });
    }

    // 切换服务状态
    async function toggleService(id) {
      const btn = document.getElementById(`service-${id}`);
      const isRunning = serviceStatus[id];
      const serviceName = services.find(s => s.id === id).name;

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      const log = document.getElementById('service-log');
      log.style.display = 'block';

      if (isRunning) {
        log.textContent = `正在重启 ${serviceName}...\n停止服务...`;
        await fetch(`/api/services/${id}/stop`, { method: 'POST' });
        await new Promise(r => setTimeout(r, 1000));
        log.textContent += '\n启动服务...';
      } else {
        log.textContent = `正在启动 ${serviceName}...`;
      }

      await fetch(`/api/services/${id}/start`, { method: 'POST' });
      log.textContent += '\n✓ 操作完成';

      setTimeout(() => {
        btn.disabled = false;
        updateServiceStatus();
      }, 2000);
    }

    async function buildModule(module) {
      event.target.setAttribute('data-original', event.target.innerHTML);
      event.target.setAttribute('data-text', '构建中...');
      const data = await callAPI('/api/build-frontend', { module });
      showLog('build-log', data);
    }

    async function callAPI(endpoint, body) {
      const btn = event.target;
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        return data;
      } finally {
        btn.disabled = false;
        btn.innerHTML = btn.getAttribute('data-text') || '完成';
        setTimeout(() => btn.innerHTML = btn.getAttribute('data-original'), 2000);
      }
    }

    function showLog(logId, data) {
      const log = document.getElementById(logId);
      log.style.display = 'block';
      log.textContent = data.success
        ? `✓ 成功\n${data.stdout || ''}`
        : `✗ 失败\n${data.error || data.stderr || ''}`;
    }

    // 页面加载时初始化
    window.onload = initServices;
  </script>
</body>
</html>
